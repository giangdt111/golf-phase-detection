services:
  golf-analysis:
    image: golf-phase-detection-golf-analysis:latest
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
    volumes:
      # Mount model weights from host so they are not baked into the image.
      # Adjust the host path if your weights live elsewhere.
      - ./model:/app/model:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
